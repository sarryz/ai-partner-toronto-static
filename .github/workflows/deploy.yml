name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Install and Build
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps
          npm run build

      - name: Handle Routing Fallbacks
        run: |
          # 1. Create a 404 fallback from the native index file to fix refreshing issues
          cp dist/client/index.html dist/client/404.html
          
          # 2. Add the .nojekyll flag so GitHub doesn't block asset folders
          touch dist/client/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/client
