name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean Install and Build
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps
          npm run build

      - name: Configure Static Routing Fallbacks
        run: |
          # 1. Create a 404 page copy to handle browser refreshing cleanly
          cp dist/index.html dist/404.html
          
          # 2. Prevent GitHub from blocking asset folders
          touch dist/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
